# Thorch image defaults.
#
# Override any of these in the environment before running scripts/build-image.sh.

THORCH_USER="${THORCH_USER:-thorch}"
# Optional build-time password/PIN applied to both the default user and root.
# Empty by default: image assembly locks both accounts until firstboot sets the
# user's chosen password. Never put a shared release credential here.
THORCH_PASSWORD="${THORCH_PASSWORD-}"
# Start SSH by default so a device becomes reachable after firstboot provisions
# the owner's password. With an empty build-time password both image accounts
# remain locked, so the daemon does not expose a shared release credential.
THORCH_ENABLE_SSH="${THORCH_ENABLE_SSH:-1}"
# Use "auto" to shrink-wrap the raw image around the populated rootfs.
# Set an explicit size, for example 16G, when you want preallocated free space.
THORCH_IMAGE_SIZE="${THORCH_IMAGE_SIZE:-auto}"
THORCH_IMAGE_AUTO_HEADROOM="${THORCH_IMAGE_AUTO_HEADROOM:-1G}"
# Root filesystem for generated images. Btrfs is the default so SD and nightly
# images get transparent zstd compression; set THORCH_ROOT_FSTYPE=ext4 to opt out.
THORCH_ROOT_FSTYPE="${THORCH_ROOT_FSTYPE:-btrfs}"
THORCH_BTRFS_MOUNT_OPTIONS="${THORCH_BTRFS_MOUNT_OPTIONS:-rw,relatime,compress=zstd:1}"
# Mount the default user's cache on tmpfs to reduce tiny browser/KDE writes on
# SD cards. Set to 0, off, none, or disabled to keep ~/.cache on the root fs.
THORCH_USER_CACHE_TMPFS_SIZE="${THORCH_USER_CACHE_TMPFS_SIZE:-512M}"
THORCH_DEFAULT_SESSION="${THORCH_DEFAULT_SESSION:-plasma-desktop}"
# Empty selects the canonical image profile from manifests/packages.json.
# A space-separated override is validated and reordered through that manifest.
THORCH_IMAGE_PACKAGES="${THORCH_IMAGE_PACKAGES-}"

# Keep this pinned for repeatable firmware and source provenance. Pinned to
# ROCKNIX next f88efbed (2026-07): SM8550 on kernel 7.1.2, Thor gpio-keys split
# (gpio-keys-ayn / gpio-keys-lid) vendored.
ROCKNIX_REF="${ROCKNIX_REF:-f88efbedf4b0326e75a24ee111b907f7ec566d30}"
ROCKNIX_REPO="${ROCKNIX_REPO:-https://github.com/ROCKNIX/distribution}"

THORCH_BUILD_DIR="${THORCH_BUILD_DIR:-build}"
THORCH_ROOTFS_RUNNER="${THORCH_ROOTFS_RUNNER:-chroot}"
THORCH_OUTPUT_DIR="${THORCH_OUTPUT_DIR:-output}"
THORCH_LOCAL_REPO_DIR="${THORCH_LOCAL_REPO_DIR:-${THORCH_OUTPUT_DIR}/repo}"
THORCH_ROCKNIX_DIR="${THORCH_ROCKNIX_DIR:-vendor/rocknix-sm8550}"
THORCH_FIRMWARE_DIR="${THORCH_FIRMWARE_DIR:-${THORCH_ROCKNIX_DIR}/firmware}"
THORCH_ROCKNIX_KERNEL_DIR="${THORCH_ROCKNIX_KERNEL_DIR:-vendor/rocknix-kernel}"
THORCH_ROCKNIX_RUNTIME_DIR="${THORCH_ROCKNIX_RUNTIME_DIR:-vendor/rocknix-runtime}"
ROCKNIX_KERNEL_SOURCE="${ROCKNIX_KERNEL_SOURCE:-nightly}"
ROCKNIX_KERNEL_RELEASE="${ROCKNIX_KERNEL_RELEASE:-latest}"
ROCKNIX_KERNEL_PLATFORM="${ROCKNIX_KERNEL_PLATFORM:-SM8550}"
THORCH_KERNEL_SOURCE_BUILD="${THORCH_KERNEL_SOURCE_BUILD:-1}"
THORCH_KERNEL_REPO="${THORCH_KERNEL_REPO:-https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git}"
THORCH_KERNEL_REF="${THORCH_KERNEL_REF:-v7.1.2}"
# build-thorch-kernel derives CONFIG_LOCALVERSION from linux-thorch pkgrel so
# changed kernel/module artifacts cannot reuse a running uname release.
THORCH_KERNEL_VERSION="${THORCH_KERNEL_REF#v}"
THORCH_KERNEL_MAJOR="${THORCH_KERNEL_VERSION%%.*}"
THORCH_KERNEL_TARBALL_URL="${THORCH_KERNEL_TARBALL_URL:-https://www.kernel.org/pub/linux/kernel/v${THORCH_KERNEL_MAJOR}.x/linux-${THORCH_KERNEL_VERSION}.tar.xz}"
THORCH_KERNEL_TARBALL_SHA256="${THORCH_KERNEL_TARBALL_SHA256:-}"
THORCH_KERNEL_CONFIG="${THORCH_KERNEL_CONFIG:-${THORCH_ROCKNIX_DIR}/linux/linux.aarch64.conf}"
THORCH_KERNEL_CONFIG_FRAGMENT="${THORCH_KERNEL_CONFIG_FRAGMENT:-packages/linux-thorch/waydroid-kernel.config}"
THORCH_KERNEL_PATCH_DIRS="${THORCH_KERNEL_PATCH_DIRS:-${THORCH_ROCKNIX_DIR}/packages/linux/patches/mainline ${THORCH_ROCKNIX_DIR}/patches/linux ${THORCH_ROCKNIX_DIR}/packages/linux/patches/default ${THORCH_ROCKNIX_DIR}/packages/linux/patches/7.0 packages/linux-thorch/patches}"
THORCH_KERNEL_DTS_DIR="${THORCH_KERNEL_DTS_DIR:-${THORCH_ROCKNIX_DIR}/linux/dts}"
THORCH_KERNEL_DTS_PATCH_DIRS="${THORCH_KERNEL_DTS_PATCH_DIRS:-packages/linux-thorch/dts-patches}"
THORCH_KERNEL_SOURCE_DIR="${THORCH_KERNEL_SOURCE_DIR:-${THORCH_BUILD_DIR}/kernel-src}"
THORCH_KERNEL_BUILD_DIR="${THORCH_KERNEL_BUILD_DIR:-${THORCH_BUILD_DIR}/kernel-build}"
if [[ -z "${THORCH_KERNEL_CROSS_COMPILE+x}" ]]; then
  case "$(uname -m)" in
    arm64|aarch64) THORCH_KERNEL_CROSS_COMPILE="" ;;
    *) THORCH_KERNEL_CROSS_COMPILE="aarch64-linux-gnu-" ;;
  esac
fi
THORCH_KERNEL_JOBS="${THORCH_KERNEL_JOBS:-$(nproc)}"

# Arch Linux ARM rootfs and package mirrors. These are intentionally explicit so
# release builds can pin or mirror them later. The first mirrors avoid the
# Geo-IP redirector, which can choose a temporarily unhealthy endpoint.
ALARM_ROOTFS_URL="${ALARM_ROOTFS_URL:-https://ca.us.mirror.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz}"
ALARM_ROOTFS_SIG_URL="${ALARM_ROOTFS_SIG_URL:-${ALARM_ROOTFS_URL}.sig}"
ALARM_ROOTFS_SIGNING_KEYS="${ALARM_ROOTFS_SIGNING_KEYS:-68B3537F39A313B3E574D06777193F152BDBE6A6}"
ALARM_ROOTFS_KEYRING_URL="${ALARM_ROOTFS_KEYRING_URL:-https://ca.us.mirror.archlinuxarm.org/aarch64/core/archlinuxarm-keyring-20240419-2-any.pkg.tar.xz}"
ALARM_ROOTFS_KEYSERVER="${ALARM_ROOTFS_KEYSERVER:-}"
ALARM_ROOTFS_KEY_FETCH_TIMEOUT="${ALARM_ROOTFS_KEY_FETCH_TIMEOUT:-20}"
# Keep defaults to origins whose certificate and aarch64/core endpoint were
# verified over HTTPS. Package signatures remain mandatory independently of TLS.
ALARM_MIRRORS="${ALARM_MIRRORS:-https://ca.us.mirror.archlinuxarm.org https://fl.us.mirror.archlinuxarm.org https://de3.mirror.archlinuxarm.org}"
ALARM_MIRROR="${ALARM_MIRROR:-https://ca.us.mirror.archlinuxarm.org}"
