name: Architecture or feature proposal
description: Propose a maintainable change to a Thorch contract or capability.
title: "proposal: "
labels:
  - proposal
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and evidence
      description: Describe the observed limitation and link code, logs, or measurements that establish it.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: State the user or contributor behavior that should become possible.
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: Proposed design
      description: Identify affected component/package contracts, state ownership, migrations, and compatibility.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include the smallest viable option and why it is insufficient, if applicable.
    validations:
      required: true
  - type: checkboxes
    id: impact
    attributes:
      label: Impact areas
      options:
        - label: Package/profile manifest or package versioning
        - label: Boot, kernel, initramfs, or recovery
        - label: Installer, partitioning, or persistent user data
        - label: Hardware behavior requiring device evidence
        - label: Upstream source, provenance, licensing, or release inputs
  - type: textarea
    id: validation
    attributes:
      label: Validation and rollout
      description: Define automated tests, hardware evidence, failure injection, rollback/recovery, and channel gates.
    validations:
      required: true
