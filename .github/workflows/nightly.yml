name: Nightly Image

on:
  workflow_dispatch:
    inputs:
      rocknix_ref:
        description: "ROCKNIX source ref for public overlays and firmware"
        required: true
        default: "next"
      rocknix_kernel_release:
        description: "ROCKNIX SM8550 image release to import"
        required: true
        default: "latest"
      image_size:
        description: "THORCH_IMAGE_SIZE"
        required: true
        default: "auto"
      root_fstype:
        description: "THORCH_ROOT_FSTYPE"
        required: true
        type: choice
        options:
          - btrfs
          - ext4
        default: "btrfs"
      publish_release:
        description: "Create or update a GitHub prerelease"
        required: true
        type: boolean
        default: true
  schedule:
    - cron: "37 13 * * *"

permissions:
  contents: write
  packages: read

concurrency:
  group: thorch-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Thorch Nightly
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    env:
      # ARM64 image published by Builder Image run 29935184834. Update this digest only
      # after the replacement builder workflow reports and verifies its digest.
      THORCH_BUILDER_DIGEST: sha256:8ef74e85679bbca19ed34ccd031ad11394d215cc38726e2bf0746e032fc9f541
      THORCH_DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/thorch-build@sha256:8ef74e85679bbca19ed34ccd031ad11394d215cc38726e2bf0746e032fc9f541
      THORCH_DOCKER_RUN_ARGS: --env THORCH_REQUIRE_MOUNT_INTEGRATION=1
      ROCKNIX_REF: ${{ inputs.rocknix_ref || 'next' }}
      ROCKNIX_KERNEL_SOURCE: nightly
      ROCKNIX_KERNEL_RELEASE: ${{ inputs.rocknix_kernel_release || 'latest' }}
      THORCH_IMAGE_SIZE: ${{ inputs.image_size || 'auto' }}
      THORCH_ROOT_FSTYPE: ${{ inputs.root_fstype || 'btrfs' }}
      THORCH_OUTPUT_DIR: output
      THORCH_BUILD_DIR: build
      THORCH_ROOTFS_RUNNER: chroot
      THORCH_KERNEL_JOBS: ${{ vars.THORCH_KERNEL_JOBS || '4' }}
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Prepare host runner
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zstd
          sudo modprobe loop || true
          command -v docker
          command -v gh

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull immutable Thorch builder image
        run: |
          set -euo pipefail
          if ! make docker-image-pull; then
            echo '::error::Unable to pull the pinned builder. The job has packages:read; verify the GHCR package is linked to this repository and grants it Actions read access.'
            exit 1
          fi
          repo_digests="$(docker image inspect "${THORCH_DOCKER_IMAGE}" --format '{{json .RepoDigests}}')"
          printf 'builder repo digests: %s\n' "${repo_digests}"
          grep -Fq "@${THORCH_BUILDER_DIGEST}" <<< "${repo_digests}" || {
            echo "::error::Pulled builder did not report the required digest ${THORCH_BUILDER_DIGEST}"
            exit 1
          }

      - name: Build and validate in Thorch builder
        run: |
          set -euo pipefail
          make docker-nightly
          sudo chown -R "$(id -u):$(id -g)" output vendor build 2>/dev/null || true

      - name: Prepare metadata
        id: meta
        run: |
          set -euo pipefail
          build_date="$(date -u +%Y%m%d)"
          short_sha="${GITHUB_SHA::12}"
          tag="nightly-${build_date}-${short_sha}"
          asset_base="thorch-arch-aarch64-${tag}"
          {
            printf 'build_date=%s\n' "${build_date}"
            printf 'short_sha=%s\n' "${short_sha}"
            printf 'tag=%s\n' "${tag}"
            printf 'title=Thorch nightly %s (%s)\n' "${build_date}" "${short_sha}"
            printf 'asset_base=%s\n' "${asset_base}"
          } >> "${GITHUB_OUTPUT}"

      - name: Package release assets
        id: package
        run: |
          set -euo pipefail
          image="${THORCH_OUTPUT_DIR}/thorch-arch-aarch64.img"
          asset_dir="${THORCH_OUTPUT_DIR}/nightly"
          asset="${asset_dir}/${{ steps.meta.outputs.asset_base }}.img.zst"
          checksum="${asset}.sha256"
          notes="${asset_dir}/${{ steps.meta.outputs.asset_base }}.notes.md"

          mkdir -p "${asset_dir}"
          zstd -T0 -19 -f -o "${asset}" "${image}"
          (
            cd "${asset_dir}"
            sha256sum "$(basename "${asset}")" > "$(basename "${checksum}")"
          )

          {
            printf 'Automated Thorch nightly build.\n\n'
            printf -- '- Commit: `%s`\n' "${GITHUB_SHA}"
            printf -- '- Source ref: `%s`\n' "${GITHUB_REF_NAME}"
            printf -- '- ROCKNIX_REF: `%s`\n' "${ROCKNIX_REF}"
            printf -- '- ROCKNIX_KERNEL_SOURCE: `%s`\n' "${ROCKNIX_KERNEL_SOURCE}"
            printf -- '- ROCKNIX_KERNEL_RELEASE request: `%s`\n' "${ROCKNIX_KERNEL_RELEASE}"
            printf -- '- THORCH_ROOT_FSTYPE: `%s`\n' "${THORCH_ROOT_FSTYPE}"
            printf -- '- Builder: `%s`\n' "${THORCH_DOCKER_IMAGE}"
            printf -- '- Image asset: `%s`\n\n' "$(basename "${asset}")"
            if [[ -f "${THORCH_ROCKNIX_KERNEL_DIR:-vendor/rocknix-kernel}/PROVENANCE" ]]; then
              printf '## Kernel Provenance\n\n```text\n'
              grep -E '^(ROCKNIX_KERNEL_|SOURCE_ROCKNIX_IMAGE_|THORCH_KERNEL_|WAYDROID_KERNEL_)' \
                "${THORCH_ROCKNIX_KERNEL_DIR:-vendor/rocknix-kernel}/PROVENANCE" || true
              printf '```\n'
            fi
          } > "${notes}"

          {
            printf 'asset=%s\n' "${asset}"
            printf 'checksum=%s\n' "${checksum}"
            printf 'notes=%s\n' "${notes}"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish prerelease
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_release }}
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          title="${{ steps.meta.outputs.title }}"
          notes="${{ steps.package.outputs.notes }}"
          asset="${{ steps.package.outputs.asset }}"
          checksum="${{ steps.package.outputs.checksum }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${asset}" "${checksum}" --clobber
            gh release edit "${tag}" --title "${title}" --notes-file "${notes}" --prerelease
          else
            gh release create "${tag}" "${asset}" "${checksum}" \
              --title "${title}" \
              --notes-file "${notes}" \
              --target "${GITHUB_SHA}" \
              --prerelease
          fi
