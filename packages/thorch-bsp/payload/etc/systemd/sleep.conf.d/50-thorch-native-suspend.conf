[Sleep]
# SM8550's validated low-power path is s2idle. The last CPU enters the real
# cluster_sleep_1 PSCI state while the PCIe suspend OPP keeps the minimum
# DDR/LLCC contract needed for a reliable firmware wake.
AllowSuspend=yes
AllowHibernation=no
AllowSuspendThenHibernate=no
AllowHybridSleep=no
SuspendState=mem
MemorySleepMode=s2idle
