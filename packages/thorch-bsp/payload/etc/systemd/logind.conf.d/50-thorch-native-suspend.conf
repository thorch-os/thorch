[Login]
# systemd-logind owns native suspend policy for the lid switch and power key.
# The Thor DTB marks the Hall lid GPIO as a wake source so opening the lid can
# wake the system after logind has put it to sleep.
HandlePowerKey=suspend
HandlePowerKeyLongPress=ignore
HandleSuspendKey=suspend
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=suspend
HandleLidSwitchDocked=suspend
# Keep suspend test runs deterministic: only explicit lid/key/manual requests
# should enter native s2idle.
IdleAction=ignore
