# Thorch hardware hotkey defaults.
#
# ROCKNIX-style Thor mappings:
#   BTN_MODE  + Volume Up/Down = brightness up/down
#   BTN_START + Volume Up/Down = RGB on/off
#   BTN_MODE  + BTN_START + Volume Up/Down = Wi-Fi on/off
#   BTN_MODE  + D-pad Up/Down = volume up/down
#   BTN_MODE  + D-pad Right/Left = brightness up/down
#   BTN_TL    + East/West/Back/North = screenshot/MangoHud/screen switch/game guide hooks
#
# Values are whitespace-separated Linux input event names or numeric codes.
#THORCH_INPUTD_DEVICE_NAMES="gpio-keys pmic_resin AYN Odin2 Gamepad RSInput Gamepad InputPlumber Keyboard Microsoft Xbox Series S|X Controller"
#THORCH_INPUTD_BRIGHTNESS_MODIFIERS=BTN_MODE
#THORCH_INPUTD_LED_MODIFIERS=BTN_START
#THORCH_INPUTD_HOTKEY_A_MODIFIERS=BTN_TL
#THORCH_INPUTD_BRIGHTNESS_STEP_PERCENT=5
#THORCH_INPUTD_DPAD_EVENTS=1
#THORCH_INPUTD_TOUCH_EVENTS=0
