# Thorch Thor hardware defaults and preferences.
#
# These defaults are applied once at boot by thorch-hw-defaults.service where
# appropriate. Runtime daemons and helper tools also read this file for shared
# user-facing preferences. Persistent changes should be written through
# thorch-hardwarectl so older split config files can be retired cleanly.

# Set to 0 to leave CPU boost disabled even when the kernel exports a boost knob.
THORCH_CPU_BOOST=1

# CPU and GPU governors applied at boot and when changed through
# thorch-hardwarectl. GPU governor writes intentionally omit a trailing newline
# because the SM8550 devfreq governor store rejects it.
THORCH_CPU_GOVERNOR=schedutil
THORCH_GPU_GOVERNOR=performance

# Fan profile:
#   quiet      - later fan ramp, lower noise
#   moderate   - balanced default
#   aggressive - earlier fan ramp
#   custom     - read THORCH_FAN_T1..T6 and THORCH_FAN_MAX_TEMP below
THORCH_FAN_PROFILE=moderate

# Poll interval in seconds.
THORCH_FAN_POLL_SECONDS=3

# Temperature selection when multiple sensors are readable:
#   max     - follow the hottest sensor
#   average - quieter broad sensor average
THORCH_FAN_SENSOR_MODE=max

# RGB mode:
#   battery - show battery charge status and keep updating it
#   static  - apply THORCH_RGB_STATIC_* once at boot
#   off     - keep the stick LEDs off
THORCH_RGB_MODE=battery
THORCH_RGB_BRIGHTNESS=255
THORCH_RGB_STATIC_R=0
THORCH_RGB_STATIC_G=128
THORCH_RGB_STATIC_B=255
THORCH_RGB_POLL_SECONDS=15

# Optional fan custom profile values, in millidegrees Celsius.
# THORCH_FAN_T1=55000
# THORCH_FAN_T2=60000
# THORCH_FAN_T3=65000
# THORCH_FAN_T4=70000
# THORCH_FAN_T5=75000
# THORCH_FAN_T6=80000
# THORCH_FAN_MAX_TEMP=85000
